    <<: *service-common
    ports:
      - "9094:9094"
      - "9999:9999"
    environment:
      <<: *env-common
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka-0:9093,1@kafka-1:9093,2@kafka-2:9093
      KAFKA_KRAFT_CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_CFG_LISTENERS: CONTROLLER://:9093,BROKER://:9091,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: BROKER://kafka-0:9091,EXTERNAL://kafka-0:9094
      KAFKA_JMX_OPTS: "-Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Dcom.sun.management.jmxremote.port=9999 -Dcom.sun.management.jmxremote.rmi.port=9999 -Djava.rmi.server.hostname=kafka-0"
    volumes:
      - kafka_0_data:/bitnami/kafka
      - ./kafka-creds/kafka-0-creds:/bitnami/kafka/config/certs

  kafka-0-jmx:
    build:
