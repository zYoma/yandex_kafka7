  schema-registry:
    image: confluentinc/cp-schema-registry:7.9.5
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
    ports:
        - "8081:8081"
    environment:
        - SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS=SASL_SSL://kafka-0:9094,SASL_SSL://kafka-1:9095,SASL_SSL://kafka-2:9096
        - SCHEMA_REGISTRY_HOST_NAME=schema-registry
        - SCHEMA_REGISTRY_LISTENERS=http://0.0.0.0:8081
        - SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL=SASL_SSL
        - SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM=PLAIN
        - SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
        - SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION=/kafka-creds/kafka.truststore.jks
        - SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD=password
        - SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_TYPE=PKCS12
        - SCHEMA_REGISTRY_KAFKASTORE_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=
    networks:
        - kafka-network
    volumes:
        - schema-registry-data:/var/lib/schema-registry
        - ./kafka-creds/kafka-0-creds:/kafka-creds

  mirror-maker:
    image: bitnamilegacy/kafka:3.4
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
      - kafka-3
      - kafka-4
      - kafka-5
    command: /opt/bitnami/kafka/bin/connect-mirror-maker.sh /opt/bitnami/kafka/config/mirror-maker.properties
    networks:
        - kafka-network
    volumes:
        - mirror-maker-data:/tmp/kafka/connect
        - ./mirror-maker.properties:/opt/bitnami/kafka/config/mirror-maker.properties:ro
        - ./kafka-creds/kafka-0-creds:/kafka-creds/source
        - ./kafka-creds/kafka-3-creds:/kafka-creds/target

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.7.1
    depends_on:
      - kafka-0
      - kafka-1
      - kafka-2
      - schema-registry
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: "kafka-0:9094,kafka-1:9095,kafka-2:9096"
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: "connect-cluster"
      CONNECT_CONFIG_STORAGE_TOPIC: "connect-configs"
      CONNECT_OFFSET_STORAGE_TOPIC: "connect-offsets"
      CONNECT_STATUS_STORAGE_TOPIC: "connect-status"
      CONNECT_KEY_CONVERTER: "org.apache.kafka.connect.storage.StringConverter"
      CONNECT_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_SECURITY_PROTOCOL: "SASL_SSL"
      CONNECT_SASL_MECHANISM: "PLAIN"
      CONNECT_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"admin\" password=\"admin-secret\";"
      CONNECT_SSL_TRUSTSTORE_LOCATION: "/kafka-creds/kafka.truststore.jks"
      CONNECT_SSL_TRUSTSTORE_PASSWORD: "password"
      CONNECT_SSL_TRUSTSTORE_TYPE: "JKS"
      CONNECT_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      CONNECT_CONSUMER_SECURITY_PROTOCOL: "SASL_SSL"
      CONNECT_CONSUMER_SASL_MECHANISM: "PLAIN"
      CONNECT_CONSUMER_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"filter_client\" password=\"filter-secret\";"
      CONNECT_CONSUMER_SSL_TRUSTSTORE_LOCATION: "/kafka-creds/kafka.truststore.jks"
      CONNECT_CONSUMER_SSL_TRUSTSTORE_PASSWORD: "password"
      CONNECT_CONSUMER_SSL_TRUSTSTORE_TYPE: "JKS"
      CONNECT_CONSUMER_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      CONNECT_PRODUCER_SECURITY_PROTOCOL: "SASL_SSL"
      CONNECT_PRODUCER_SASL_MECHANISM: "PLAIN"
      CONNECT_PRODUCER_SASL_JAAS_CONFIG: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"admin\" password=\"admin-secret\";"
      CONNECT_PRODUCER_SSL_TRUSTSTORE_LOCATION: "/kafka-creds/kafka.truststore.jks"
      CONNECT_PRODUCER_SSL_TRUSTSTORE_PASSWORD: "password"
      CONNECT_PRODUCER_SSL_TRUSTSTORE_TYPE: "JKS"
      CONNECT_PRODUCER_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ""
      CONNECT_PLUGIN_PATH: "/usr/share/java,/kafka-connect-plugins"
    networks:
      - kafka-network
    volumes:
      - kafka-connect-data:/var/lib/kafka-connect
      - ./kafka-creds/kafka-0-creds:/kafka-creds
      - ./kafka-connect/plugins:/kafka-connect-plugins
      - ./kafka-connect/allowed-products.json:/etc/kafka-connect/allowed-products.json:ro
      - ./kafka-connect/output:/data/output

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - kafka-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.4
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/kafka-dashboard.json:ro
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/provision-dashboards.yml:ro
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    depends_on:
      - prometheus
    networks:
      - kafka-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
      - "--cluster.listen-address="
      - "--cluster.advertise-address="
      - "--cluster.peer="
    networks:
      - kafka-network
    restart: unless-stopped
  
  shop:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    command: ["/bin/sh", "-c", "sleep 10 && /app/yandex-kafka shop"]
    env_file:
      - ./.env.shop
    volumes:
      - ./kafka-creds:/app/ca
      - ./products_source.json:/app/products_source.json
    networks:
      - kafka-network
    depends_on:
     - kafka-0
     - kafka-1
     - kafka-2

volumes:
  kafka_0_data:
  kafka_1_data:
  kafka_2_data:
  kafka_3_data:
  kafka_4_data:
  kafka_5_data:
  schema-registry-data:
  mirror-maker-data:
  kafka-connect-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:

networks:
  kafka-network:
    driver: bridge