      - JMX_PORT=9999
      - JMX_EXPORTER_CONFIG_FILE=/opt/jmx-exporter/config.yml
    volumes:
      - ./monitoring/jmx_exporter_config.yml:/opt/jmx-exporter/config.yml:ro
    networks:
      - kafka-network
    depends_on:
