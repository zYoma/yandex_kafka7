global:
  resolve_timeout: 5m
  smtp_smarthost: "localhost:25"
  smtp_from: "alertmanager@example.com"
  smtp_require_tls: false

route:
  group_by: ["alertname", "cluster"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: "default"
  routes:
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
    - match:
        severity: warning
      receiver: "warning"
    - match:
        severity: info
      receiver: "info"

receivers:
  - name: "default"
    email_configs:
      - to: "team@example.com"
        headers:
          Subject: "[ALERT] {{ .GroupLabels.alertname }}"

  - name: "critical"
    email_configs:
      - to: "oncall@example.com"
        headers:
          Subject: "[CRITICAL] {{ .GroupLabels.alertname }} - {{ .GroupLabels.cluster }}"

  - name: "warning"
    email_configs:
      - to: "devops@example.com"
        headers:
          Subject: "[WARNING] {{ .GroupLabels.alertname }} - {{ .GroupLabels.cluster }}"

  - name: "info"
    email_configs:
      - to: "team@example.com"
        headers:
          Subject: "[INFO] {{ .GroupLabels.alertname }}"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "cluster"]
